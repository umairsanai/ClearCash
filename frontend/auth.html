<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearCash - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
    <script defer type="module" src="js/auth.js"></script>
</head>
<body>
    <header class="auth-header">
        <nav class="header-nav">
            <div class="header-logo">
                <span class="logo-icon" aria-hidden="true">
                    <i class="fas fa-wallet"></i>
                </span>
                <h1 id="app-name">ClearCash</h1>
            </div>
            <div class="header-cta">
                <a class="ghost-link" href="index.html">Go to app</a>
            </div>
        </nav>
    </header>

    <main class="auth-main">
        <section class="auth-card" aria-labelledby="auth-title">
            <div class="auth-card-header">
                <p class="chip" id="auth-chip">Welcome back</p>
                <h2 id="auth-title">Login</h2>
                <p id="auth-subtitle" class="subtitle">Use your ClearCash username and password.</p>
            </div>
            <form id="auth-form" novalidate>
                <div id="auth-fields" class="auth-fields">
                    <div class="form-group"></div>
                </div>

                <button id="submit-btn" type="submit" class="primary-btn">Login</button>

                <p class="switch-text">
                    <span id="switch-hint">New here?</span>
                    <button type="button" id="switch-btn" class="link-btn">Create an account</button>
                </p>

                <button type="button" class="google-login-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 262">
                        <path fill="#4285F4" d="M255.878 133.451c0-10.734-.871-18.567-2.756-26.69H130.55v48.448h71.947c-1.45 12.04-9.283 30.172-26.69 42.356l-.244 1.622 38.755 30.023 2.685.268c24.659-22.774 38.875-56.282 38.875-96.027"></path>
                        <path fill="#34A853" d="M130.55 261.1c35.248 0 64.839-11.605 86.453-31.622l-41.196-31.913c-11.024 7.688-25.82 13.055-45.257 13.055-34.523 0-63.824-22.773-74.269-54.25l-1.531.13-40.298 31.187-.527 1.465C35.393 231.798 79.49 261.1 130.55 261.1"></path>
                        <path fill="#FBBC05" d="M56.281 156.37c-2.756-8.123-4.351-16.827-4.351-25.82 0-8.994 1.595-17.697 4.206-25.82l-.073-1.73L15.26 71.312l-1.335.635C5.077 89.644 0 109.517 0 130.55s5.077 40.905 13.925 58.602l42.356-32.782"></path>
                        <path fill="#EB4335" d="M130.55 50.479c24.514 0 41.05 10.589 50.479 19.438l36.844-35.974C195.245 12.91 165.798 0 130.55 0 79.49 0 35.393 29.301 13.925 71.947l42.211 32.783c10.59-31.477 39.891-54.251 74.414-54.251"></path>
                    </svg>
                    <span>Login with Google</span>
                </button>

                <p id="form-message" class="form-message" role="alert" aria-live="polite"></p>
            </form>
        </section>
    </main>
</body>
</html>
